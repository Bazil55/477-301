<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form & Accessibility Audit</title>
</head>
<body>
    <header>
        <h1>User Registration System</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#register">Register</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="register">
            <h2>Create Your Account</h2>
            
            <form action="/submit" method="post">
                
                <fieldset>
                    <legend>Personal Details</legend>

                    <div>
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname" required minlength="3">
                    </div>
                    <div>
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div>
                        <label for="phone">Phone Number (10 digits):</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0812345678">
                    </div>
                    <div>
                        <label for="dob">Date of Birth:</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Account Preferences</legend>
                    <div>
                        <label for="experience">Years of Experience:</label>
                        <input type="number" id="experience" name="experience" min="0" max="50" value="0">
                    </div>

                    <div>
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">I agree to the terms and conditions</label>
                    </div>
                </fieldset>

                <br>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>


</body>
</html>
